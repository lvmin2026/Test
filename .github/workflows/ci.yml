name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache Allure
      id: cache-allure
      uses: actions/cache@v4
      with:
        path: |
          /opt/allure-2.26.0
          /usr/bin/allure
        key: allure-2.26.0

    - name: Install Allure
      if: steps.cache-allure.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update && sudo apt-get install -y openjdk-11-jre
        wget https://github.com/allure-framework/allure2/releases/download/2.26.0/allure-2.26.0.tgz
        tar -xzf allure-2.26.0.tgz
        sudo cp -r allure-2.26.0 /opt/
        sudo ln -s /opt/allure-2.26.0/bin/allure /usr/bin/allure

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests with pytest
      run: pytest tests/ --alluredir=allure-results

    - name: Generate Allure report
      run: allure generate allure-results --clean -o allure-report

    - name: Upload Allure report artifact
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report

  deploy-report:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Cache Allure
      id: cache-allure-deploy
      uses: actions/cache@v4
      with:
        path: |
          /opt/allure-2.26.0
          /usr/bin/allure
        key: allure-2.26.0

    - name: Install Allure
      if: steps.cache-allure-deploy.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update && sudo apt-get install -y openjdk-11-jre
        wget https://github.com/allure-framework/allure2/releases/download/2.26.0/allure-2.26.0.tgz
        tar -xzf allure-2.26.0.tgz
        sudo cp -r allure-2.26.0 /opt/
        sudo ln -s /opt/allure-2.26.0/bin/allure /usr/bin/allure

    - name: Download Allure results
      uses: actions/download-artifact@v4
      with:
        name: allure-report
        path: allure-report

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./allure-report
        force_orphan: true